<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slow Roads Style 3D Driving Game (Curved Road + Forests)</title>
<style>
body{margin:0;overflow:hidden;background:#87ceeb;font-family:Arial}
.info{position:absolute;top:15px;left:15px;background:rgba(0,0,0,.6);color:white;padding:12px 18px;border-radius:12px;font-size:14px}
.speed{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:white;padding:12px 25px;border-radius:20px;font-size:20px}
</style>
</head>
<body>

<div class="info">
<b>Slow Roads Style Game</b><br>
W / Up = Accelerate<br>
S / Down = Brake<br>
A / Left = Turn Left<br>
D / Right = Turn Right
</div>

<div class="speed" id="speed">0 km/h | 0 m</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 50, 700);

// ================= CAMERA =================
const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 8000);
camera.position.set(0,6,-12);

// ================= RENDERER =================
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ================= REAL SKY + MOVING SUN =================
const sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(80,120,60);
scene.add(sun);
scene.add(new THREE.AmbientLight(0xffffff,0.5));

let sunAngle = 0;

// ================= HUGE MOUNTAIN TERRAIN =================

const chunkSize = 250;
const visibleRange = 4;
const chunks = {};

function noise(x,z){
    return Math.sin(x*0.002)*45 + Math.cos(z*0.002)*45
         + Math.sin(x*0.008)*15 + Math.cos(z*0.008)*15
         + Math.sin(x*0.03)*3 + Math.cos(z*0.03)*3;
}

function height(x,z){
    return noise(x,z);
}

// curved road path (infinite curve)
function roadCenter(z){
    return Math.sin(z*0.003)*60 + Math.sin(z*0.0008)*120;
}

function createChunk(cx,cz){

    const key = cx+","+cz;
    if(chunks[key]) return;

    // ================= ADVANCED TERRAIN WITH BIOMES =================
    const geo = new THREE.PlaneGeometry(chunkSize,chunkSize,80,80);
    geo.rotateX(-Math.PI/2);

    const colors = [];

    for(let i=0;i<geo.attributes.position.count;i++){
        const vx = geo.attributes.position.getX(i) + cx;
        const vz = geo.attributes.position.getZ(i) + cz;
        const h = height(vx,vz);

        geo.attributes.position.setY(i,h);

        // ================= BIOME COLORS =================
        let color;

        if(h < -18){
            // sand near water
            color = new THREE.Color(0xd9c27a);
        }
        else if(h < 15){
            // grass land
            color = new THREE.Color(0x4caf50);
        }
        else if(h < 35){
            // mountain rock
            color = new THREE.Color(0x8d8d8d);
        }
        else{
            // snow mountains
            color = new THREE.Color(0xffffff);
        }

        colors.push(color.r,color.g,color.b);
    }

    geo.setAttribute("color",new THREE.Float32BufferAttribute(colors,3));
    geo.computeVertexNormals();

    const terrain = new THREE.Mesh(
        geo,
        new THREE.MeshStandardMaterial({vertexColors:true})
    );

    terrain.position.set(cx,0,cz);
    scene.add(terrain);
    chunks[key] = terrain;


    // ================= SMART RIVER SYSTEM (SLOPE + VALLEYS + ROAD AVOIDANCE) =================

    const waterLevel = -18;

    // detect slope (water should flow downhill areas only)
    function slope(x,z){
        const h1 = height(x-3,z);
        const h2 = height(x+3,z);
        const h3 = height(x,z-3);
        const h4 = height(x,z+3);
        return Math.abs(h1-h2) + Math.abs(h3-h4);
    }

    // flatten deep valleys (creates river beds naturally)
    for(let i=0;i<geo.attributes.position.count;i++){
        const vx = geo.attributes.position.getX(i) + cx;
        const vz = geo.attributes.position.getZ(i) + cz;

        let h = height(vx,vz);

        if(h < waterLevel && slope(vx,vz) > 2){
            geo.attributes.position.setY(i, waterLevel);
        }
    }

    // reflective water surface only where valley exists and NOT on road
    const waterGeo = new THREE.PlaneGeometry(chunkSize,chunkSize,1,1);
    waterGeo.rotateX(-Math.PI/2);

    const water = new THREE.Mesh(
        waterGeo,
        new THREE.MeshStandardMaterial({
            color:0x1e88e5,
            transparent:true,
            opacity:0.75,
            metalness:0.8,
            roughness:0.15
        })
    );

    water.position.set(cx, waterLevel + 0.05, cz);

    scene.add(water);


    // ================= WATERFALL GENERATION =================

    for(let i=0;i<10;i++){

        const wx = cx + Math.random()*chunkSize - chunkSize/2;
        const wz = cz + Math.random()*chunkSize - chunkSize/2;

        const h1 = height(wx,wz);
        const h2 = height(wx,wz+6);

        // big height drop = waterfall
        if(h1 - h2 > 18){

            const fall = new THREE.Mesh(
                new THREE.PlaneGeometry(4,20),
                new THREE.MeshStandardMaterial({color:0x90caf9,transparent:true,opacity:0.7})
            );

            fall.position.set(wx,h1-10,wz+3);
            scene.add(fall);
        }
    }


    // ================= CONTINUOUS CURVED ROAD =================

    const roadWidth = 12;
    const roadSegments = 80;

    const roadGeo = new THREE.PlaneGeometry(roadWidth,chunkSize,8,roadSegments);
    roadGeo.rotateX(-Math.PI/2);

    for(let i=0;i<roadGeo.attributes.position.count;i++){

        let x = roadGeo.attributes.position.getX(i);
        let localZ = roadGeo.attributes.position.getZ(i);

        const worldZ = localZ + cz;

        const curve = Math.sin(worldZ*0.003)*80 + Math.sin(worldZ*0.0007)*140;

        const worldX = x + curve;
        const y = height(worldX,worldZ);

        roadGeo.attributes.position.setX(i,worldX - cx);
        roadGeo.attributes.position.setY(i,y + 0.15);
    }

    roadGeo.computeVertexNormals();

    const road = new THREE.Mesh(
        roadGeo,
        new THREE.MeshStandardMaterial({color:0x1f1f1f})
    );

    road.position.set(cx,0,cz);
    scene.add(road);


    


    // ================= SMART FOREST (NO TREES IN WATER / PONDS) =================

    for(let i=0;i<120;i++){

        const tx = cx + Math.random()*chunkSize - chunkSize/2;
        const tz = cz + Math.random()*chunkSize - chunkSize/2;

        const ty = height(tx,tz);

        // do NOT spawn trees in water / sand areas
        if(ty < -16) continue;

        // keep road clear
        if(Math.abs(tx - roadCenter(tz)) < 18) continue;

        const tree = new THREE.Group();

        const trunk = new THREE.Mesh(
            new THREE.CylinderGeometry(0.35,0.45,5,8),
            new THREE.MeshStandardMaterial({color:0x8b5a2b})
        );
        trunk.position.y = 2.5;
        tree.add(trunk);

        const leaves = new THREE.Mesh(
            new THREE.ConeGeometry(2.5,6,8),
            new THREE.MeshStandardMaterial({color:0x1b5e20})
        );
        leaves.position.y = 6;
        tree.add(leaves);

        tree.position.set(tx,ty,tz);
        scene.add(tree);
    }
}

function updateChunks(x,z){

    const cx = Math.floor(x/chunkSize)*chunkSize;
    const cz = Math.floor(z/chunkSize)*chunkSize;

    const needed = {};

    // load nearby chunks
    for(let dx=-visibleRange;dx<=visibleRange;dx++){
        for(let dz=-visibleRange;dz<=visibleRange;dz++){
            const nx = cx + dx*chunkSize;
            const nz = cz + dz*chunkSize;
            const key = nx+","+nz;
            needed[key] = true;
            createChunk(nx,nz);
        }
    }

    // ================= CHUNK UNLOADER (PERFORMANCE FIX) =================

    for(const key in chunks){
        if(!needed[key]){
            const chunk = chunks[key];
            scene.remove(chunk);
            chunk.geometry.dispose();
            chunk.material.dispose();
            delete chunks[key];
        }
    }
}

// ================= BETTER CAR =================
const car = new THREE.Group();
scene.add(car);

const body = new THREE.Mesh(
    new THREE.BoxGeometry(2.8,0.7,4.8),
    new THREE.MeshStandardMaterial({color:0xff2a2a})
);
body.position.y = 1.4;
car.add(body);

const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(1.9,0.7,2.4),
    new THREE.MeshStandardMaterial({color:0x111111})
);
cabin.position.y = 2.1;
cabin.position.z = -0.3;
car.add(cabin);

function wheel(x,z){
    const w = new THREE.Mesh(
        new THREE.CylinderGeometry(0.55,0.55,0.5,20),
        new THREE.MeshStandardMaterial({color:0x000000})
    );
    w.rotation.z = Math.PI/2;
    w.position.set(x,0.6,z);
    car.add(w);
}

wheel(-1.3,1.6);
wheel(1.3,1.6);
wheel(-1.3,-1.6);
wheel(1.3,-1.6);

// ================= MOVEMENT + TERRAIN FOLLOW =================
let speed = 0;
let distance = 0;
let keys = {};

window.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function getSlopeRotation(x,z){
    const h1 = height(x-2,z);
    const h2 = height(x+2,z);
    const h3 = height(x,z-2);
    const h4 = height(x,z+2);

    const tiltX = (h3 - h4)*0.03;
    const tiltZ = (h1 - h2)*0.03;

    return {tiltX, tiltZ};
}

// ================= LOOP =================
function animate(){
requestAnimationFrame(animate);

if(keys["w"]||keys["arrowup"]) speed+=0.02;
if(keys["s"]||keys["arrowdown"]) speed-=0.02;

speed*=0.97;

if(keys["a"]||keys["arrowleft"]) car.rotation.y+=0.03;
if(keys["d"]||keys["arrowright"]) car.rotation.y-=0.03;

car.position.x+=Math.sin(car.rotation.y)*speed*6;
car.position.z+=Math.cos(car.rotation.y)*speed*6;

// terrain follow
car.position.y = height(car.position.x,car.position.z) + 1.1;

// suspension tilt
const slope = getSlopeRotation(car.position.x,car.position.z);
car.rotation.x = slope.tiltX;
car.rotation.z = slope.tiltZ;

updateChunks(car.position.x,car.position.z);

// camera follow
camera.position.x += (car.position.x - camera.position.x)*0.08;
camera.position.z += (car.position.z-14 - camera.position.z)*0.08;
camera.position.y += (car.position.y+9 - camera.position.y)*0.08;

camera.lookAt(car.position.x,car.position.y+1.5,car.position.z+5);

// speedometer
const kmh = Math.abs(speed*200).toFixed(0);
distance += Math.abs(speed*2);

document.getElementById("speed").innerHTML = kmh+" km/h | "+Math.floor(distance)+" m";

renderer.render(scene,camera);
}

animate();

// resize
window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
